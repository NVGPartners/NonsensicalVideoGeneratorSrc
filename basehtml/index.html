<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Consent Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <img src="logo.png" alt="logo">
    <p>
        User consent form for {{pluginName}}:
        <br>
        {{name}}: {{description}} 
        <br>
        This script is requesting access to the following:</p>
    <ul id="consents"></ul>
    <a href="steam://run/2516360/?accept={{pluginName}}"><button type="button">Accept and Re-Launch</button></a>
    <a href="https://steamcommunity.com/sharedfiles/filedetails/?id={{workshopid}}"><button type="button" id="workshop">Visit Workshop Page</button></a>
    <script>
        const DownloadFiles = 1;
        const ExecutePrograms = 2;
        const DownloadMedia = 4;
        const workshopid = "{{workshopid}}";
        if (workshopid == "")
        {
            const workshop = document.getElementById('workshop');
            workshop.style.display = 'none';
        }
        // Build the consents
        const consentFlags = {{consents}};
        const consentParams = JSON.parse('{{consentParams}}');
        const consents = document.getElementById('consents');
        // Consent flags is a bitfield, so we need to iterate over each bit
        // Only 1, 2, and 4 are used, so we can just check for those
        if (consentFlags & 1) {
            // Download files
            const files = consentParams["DownloadFiles"]
            const filesList = document.createElement('ul');
            for (const file of files) {
                const fileItem = document.createElement('li');
                fileItem.innerText = file;
                filesList.appendChild(fileItem);
            }
            const filesConsent = document.createElement('li');
            filesConsent.innerText = 'The ability to download these files:';
            filesConsent.appendChild(filesList);
            consents.appendChild(filesConsent);
        }
        if (consentFlags & 2) {
            // Execute programs
            const programs = consentParams["ExecutePrograms"]
            const programsList = document.createElement('ul');
            for (const program of programs) {
                const programItem = document.createElement('li');
                programItem.innerText = program;
                programsList.appendChild(programItem);
            }
            const programsConsent = document.createElement('li');
            programsConsent.innerText = 'The ability to execute these programs:';
            programsConsent.appendChild(programsList);
            consents.appendChild(programsConsent);
        }
    </script>
  </body>
</html>
